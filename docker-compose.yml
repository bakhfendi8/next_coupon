services:

  # ── PHP Application ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: coupon_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - coupon_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-coupon_system}
      - DB_USERNAME=${DB_USERNAME:-coupon_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=predis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis

  # ── Nginx Web Server ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: coupon_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - coupon_network
    depends_on:
      - app

  # ── MySQL Database ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: coupon_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-coupon_system}
      MYSQL_USER: ${DB_USERNAME:-coupon_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - coupon_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - coupon_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: coupon_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - coupon_redis_data:/data
    networks:
      - coupon_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Queue Worker — high ─────────────────────────────────────────────────────
  worker_high:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: coupon_worker_high
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --queue=high --tries=3 --timeout=30 --sleep=1 --max-jobs=500
    volumes:
      - .:/var/www
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - coupon_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-coupon_system}
      - DB_USERNAME=${DB_USERNAME:-coupon_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_CLIENT=predis
      - QUEUE_CONNECTION=redis

  # ── Queue Worker — default ──────────────────────────────────────────────────
  worker_default:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: coupon_worker_default
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --queue=default --tries=5 --timeout=60 --sleep=2 --max-jobs=500
    volumes:
      - .:/var/www
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - coupon_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-coupon_system}
      - DB_USERNAME=${DB_USERNAME:-coupon_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_CLIENT=predis
      - QUEUE_CONNECTION=redis

  # ── Queue Worker — low ──────────────────────────────────────────────────────
  worker_low:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: coupon_worker_low
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --queue=low --tries=5 --timeout=30 --sleep=5 --max-jobs=1000
    volumes:
      - .:/var/www
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - coupon_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-coupon_system}
      - DB_USERNAME=${DB_USERNAME:-coupon_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_CLIENT=predis
      - QUEUE_CONNECTION=redis

  # ── Scheduler ───────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: coupon_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - .:/var/www
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - coupon_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-coupon_system}
      - DB_USERNAME=${DB_USERNAME:-coupon_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_CLIENT=predis
      - QUEUE_CONNECTION=redis

  # ── Vite (dev only) ─────────────────────────────────────────────────────────
  # Start with: docker compose --profile dev up
  # Not needed in production — run npm run build before deploying
  vite:
    image: node:20-alpine
    container_name: coupon_vite
    working_dir: /var/www
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www
      - /var/www/node_modules
    networks:
      - coupon_network
    profiles:
      - dev

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  coupon_network:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  coupon_mysql_data:
    driver: local
  coupon_redis_data:
    driver: local